services:
  - type: web
    name: trading-one
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:cloud
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://trading-one.onrender.com
      - key: TICK_INTERVAL_MS
        value: 3000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
